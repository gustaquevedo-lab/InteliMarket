services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intelimarket
      POSTGRES_PASSWORD: password
      POSTGRES_DB: intelimarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelimarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api/src:/app/api/src
    command: uvicorn api.src.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A api.src.tasks worker --loglevel=info

  frontend:
    build:
      context: ./ui-web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./ui-web/src:/app/src
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
